<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Notes App</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.28/dist/katex.min.js" integrity="sha384-+W9OcrYK2/bD7BmUAk+xeFAyKp0QjyRQUCxeU31dfyTt/FrPsUgaBTLLkVf33qWt" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.28/dist/katex.min.css" integrity="sha384-Wsr4Nh3yrvMf2KCebJchRJoVo1gTU6kcP05uRSh5NV3sj9+a8IomuJoQzf3sMq4T" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background-color: #f4f4f9;
    }

    button {
      padding: 10px;
      margin: 5px;
      font-size: 16px;
      cursor: pointer;
    }

    ul {
      list-style-type: none;
      padding-left: 20px;
    }

    .note {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 5px;
      flex-wrap: wrap;
    }

    .note-button {
      background-color: transparent;
      border: none;
      font-size: 18px;
      cursor: pointer;
      padding: 10px 5px;
      flex-shrink: 0;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .controls span {
      cursor: pointer;
      color: #007BFF;
      font-size: 16px;
      margin-right: 6px;
    }

    .controls span:hover {
      text-decoration: underline;
    }

    .child-notes {
      display: none;
      padding-left: 40px;
    }

    .expand-btn {
      visibility: hidden;
    }

    .note-button img {
      max-width: 100%;
      height: auto;
      display: block;
      margin: 10px 0;
    }

    .note-button pre {
      background: #f4f4f4;
      padding: 10px;
      border-radius: 4px;
      overflow-x: auto;
    }

    .note-button code {
      background: #f4f4f4;
      padding: 2px 6px;
      border-radius: 3px;
      font-family: 'Courier New', monospace;
    }

    .note-button pre code {
      background: none;
      padding: 0;
    }

    .note-button a {
      color: #007bff;
      text-decoration: none;
    }

    .note-button a:hover {
      text-decoration: underline;
    }
    .search-hit {
      background: yellow;
    }
    .search-input {
      width: 100%;
      max-width: 420px;
      padding: 8px 12px;
      font-size: 14px;
      line-height: 1.4;
      border: 1px solid #ccc;
      border-radius: 6px;
      outline: none;
      box-sizing: border-box;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .search-input:focus {
      border-color: #4f8cff;
      box-shadow: 0 0 0 2px rgba(79, 140, 255, 0.2);
    }
    #searchbar {
      position: sticky;
      top: 0;
      background: #f4f4f9;
      padding: 8px 0;
      z-index: 10;
      border-bottom: 1px solid #ddd;
    }
  </style>
</head>
<body>

  <h1>Notes</h1>
  <button onclick="addNewNote()">➕ Add New Note</button>
  <button onclick="exportNotes()">📤 Save to File</button>
  <input type="file" id="fileInput" style="display:none" accept=".json" onchange="importNotes(event)">
  <button onclick="document.getElementById('fileInput').click()">📥 Load from File</button>
  <br>
  <div id="searchbar">
  <input id="searchInput" class="search-input" placeholder="Search…" oninput="searchNotes(this.value)" />
  <span id="searchStatus" style="font-size:12px;color:#555;"></span>
  <button onclick="prevResult()">⬆</button>
  <button onclick="nextResult()">⬇</button>
  <div id="ocrStatus" style="margin-top:6px;font-size:12px;color:#555;"></div>
  </div>
  <ul id="notes"></ul>

  <script>
    marked.setOptions({
      breaks: true,
      gfm: true
    });
    let searchExpansionSnapshot = null;
    let ocrInFlight = 0;
    let searchResults = [];
    let searchIndex = -1;
    function renderLatex(text) {
      // Replace display math $$...$$
      text = text.replace(/\$\$([^\$]+)\$\$/g, (match, expr) => {
        try {
          return katex.renderToString(expr, { displayMode: true, throwOnError: false });
        } catch (e) {
          return match;
        }
      });

      // Replace inline math $...$
      text = text.replace(/\$([^\$]+)\$/g, (match, expr) => {
        try {
          return katex.renderToString(expr, { throwOnError: false });
        } catch (e) {
          return match;
        }
      });
      
      return text;
    }
    function extractImages(title) {
      return [...title.matchAll(/<img\s+[^>]*src=["']([^"']+)["'][^>]*>/gi)]
        .map(m => m[1])
    }

    function hasImage(title) {
      return extractImages(title).length > 0
    }

    function isBase64Image(str) {
      return str.trim().startsWith('data:image/');
    }

    function renderContent(content) {
      //console.log('content: ',content)
      if (!content) return '';

      let result = '';
      const sp=content.split('~')
      //console.log(sp)
      if (sp.length===1){return }
      for (let a=0;a<sp.length;a++){
        if (a%2==0){
          result+=sp[a]
        }
        else{
          result+=marked.parse(renderLatex(sp[a]))
        }
        //console.log('result: ',result)
      }
      return result
    }


    function createNoteElement(content = 'New Note') {
      const li = document.createElement('li');
      // generate id here
      li.dataset.id = crypto.randomUUID();
      li.dataset.parentId = null;
      li.innerHTML = `
        <div class="note">
          <div class="note-button" ondblclick="makeEditable(this)" contenteditable="false">${content}</div>
          <div class="controls">    
            <span onclick="addSibling(this)"> ☝ </span>
            <span onclick="addChild(this)">↳ </span>
            <span class="expand-btn" onclick="toggleChildren(this)">🔽 </span>
            <span onclick="deleteNote(this)">❌</span>
          </div>
        </div>
        <ul class="child-notes"></ul>
      `;
      return li;
    }

    function makeEditable(el) {
      // Store the raw content for editing
      if (!el.dataset.raw) {
        el.dataset.raw = el.innerText;
      }
      
      // Show raw content while editing
      el.innerHTML = el.dataset.raw;
      el.setAttribute('contenteditable', 'true');
      setTimeout(()=>el.focus(),10) //Don't remove this, it makes sure rendered latex is shown when blurred

      if (!el.dataset.listenerAttached) {
        el.dataset.listenerAttached = "true";

        el.addEventListener("paste", (e) => {
          e.preventDefault();

          const clipboardItems = e.clipboardData.items;
          
          // Check for images in clipboard
          for (let i = 0; i < clipboardItems.length; i++) {
            const item = clipboardItems[i];
            // console.log(item,i);
            if (item.type.startsWith('image/')) {
              const file = item.getAsFile();
              const reader = new FileReader();
              
              reader.onload = function(event) {
                const imgElement = `<img src="${event.target.result}" alt="Pasted Image" style="max-width: 100%; height: auto;">`;
                document.execCommand("insertHTML", false, imgElement);
              };
              reader.readAsDataURL(file);
              return;
            }
          }

          const text = e.clipboardData.getData("text/plain");
          const urlRegex = /^(https?:\/\/[^\s]+)/;

          if (urlRegex.test(text)) {
            document.execCommand("insertHTML", false, `<a href="${text}" target="_blank">${text}</a>`);
          } else {
            document.execCommand("insertText", false, text);
          }
        });

        el.addEventListener("blur", () => {
          el.setAttribute("contenteditable", "false");
          // Invalidate OCR on any edit
          const li = el.closest('li');
          if (li && li.dataset.ocr) {
            delete li.dataset.ocr;
          }
          // If contains image or link, skip rendering
          if (el.querySelector('img') || el.querySelector('a')) {
            //console.log('Image or link found, skipping renderContent()');
            el.dataset.raw = el.innerHTML;
            return;
          }
          // Store raw content
          el.dataset.raw = el.innerText || el.innerHTML;
          //console.log('raw',el.innerHTML)
          // Render content with markdown blocks
          const k=renderContent(el.dataset.raw);
          if (k) el.innerHTML = k;
          //console.log(el.innerText,el.dataset.raw)
        });
      }
    }

    function toggleChildren(btn) {
      const li = btn.closest('li');
      const childList = li.querySelector('.child-notes');
      if (!childList) return;
      if (childList.style.display === "none") {
        childList.style.display = "block";
        btn.textContent = "▲";
      } else {
        childList.style.display = "none";
        btn.textContent = "🔽";
      }
    }

    function addNewNote() {
      const newNote = createNoteElement();
      document.getElementById('notes').appendChild(newNote);
    }

    function addChild(control) {
      const li = control.closest('li');
      const childList = li.querySelector('.child-notes');
      const newChild = createNoteElement();
      // set parentId here
      newChild.dataset.parentId = li.dataset.id;
      childList.appendChild(newChild);
      childList.style.display = "block";
      const expandBtn = li.querySelector('.expand-btn');
      expandBtn.style.visibility = "visible";
      expandBtn.textContent = "▲";
    }

    function addSibling(control) {
      const li = control.closest('li');
      const newLi = createNoteElement();
      newLi.dataset.parentId = li.dataset.parentId;
      li.parentNode.insertBefore(newLi, li);
    }

    function deleteNote(control) {
      const li = control.closest('li');
      li.remove();
    }

    function getNoteData(ul) {
      const data = [];
      for (const li of ul.children) {
        const noteButton = li.querySelector('.note-button');
        // Get raw content if available, otherwise get innerHTML
        const title = noteButton.dataset.raw || noteButton.innerHTML;
        const childUl = li.querySelector('.child-notes');
        const node = {
          id: li.dataset.id,
          parentId: li.dataset.parentId ?? null,
          title,
          children: getNoteData(childUl),
          links: li.dataset.links
            ? JSON.parse(li.dataset.links)
            : []
        };

        // Persist OCR only if images still exist
        if (hasImage(title) && li.dataset.ocr) {
          node.ocr = li.dataset.ocr;
        }

        data.push(node);
      }
      return data;
    }

    function exportNotes() {
      //const filenameInput = document.getElementById('filenameInput').value.trim();
      //filenameInput ? filenameInput : 
      const filename = 'notes.json';

      const data = getNoteData(document.getElementById('notes'));
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);

      const a = document.createElement('a');
      a.href = url;
      a.download = filename.endsWith('.json') ? filename : filename + '.json';
      a.click();

      URL.revokeObjectURL(url);
    }

    function importNotes(event) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const data = JSON.parse(e.target.result);
          data.forEach(n => normalize(n));
          const container = document.getElementById('notes');
          container.innerHTML = '';
          data.forEach(note => {
            const li = buildNoteFromData(note);
            // li.dataset.id = note.id;
            // li.dataset.parentId = note.parentId;
            if (note.links && note.links.length) {
              li.dataset.links = JSON.stringify(note.links);
            }
            if (note.ocr) {
              li.dataset.ocr = note.ocr;
            }
            container.appendChild(li);
          });
        } catch (e) {
          alert('Failed to load notes: Invalid file format.');
        }
      };
      reader.readAsText(file);
    }
    function normalize(node, parentId = null) {
      node.id ??= crypto.randomUUID()
      node.parentId = parentId

      node.title ??= ""
      node.children ??= []
      node.links ??= []

      // OCR hygiene
      if (!hasImage(node.title)) {
        delete node.ocr
      }

      for (const child of node.children) {
        normalize(child, node.id)
      }

      return node
    }

    function buildNoteFromData(item) {
      const li = createNoteElement(item.title);
      li.dataset.id = item.id;
      li.dataset.parentId = item.parentId ?? null;
      if (item.links && item.links.length) {
        li.dataset.links = JSON.stringify(item.links);
      }
      const noteButton = li.querySelector('.note-button');
      
      // Store raw content
      noteButton.dataset.raw = item.title;
      // Render content with markdown blocks
      const k=renderContent(item.title);
      //console.log(k);
      if (k) noteButton.innerHTML = k;
      else noteButton.innerHTML=item.title
      
      const childUl = li.querySelector('.child-notes');

      for (const child of item.children) {
        const childLi = buildNoteFromData(child);
        childLi.dataset.parentId = item.id;
        childUl.appendChild(childLi);
      }

      // Hide children initially
      childUl.style.display = 'none';

      if (item.children.length > 0) {
        const toggleBtn = li.querySelector('.expand-btn');
        if (toggleBtn) {
          toggleBtn.style.visibility = 'visible';
          toggleBtn.textContent = '🔽';
        }
      }
      if (item.ocr) {
        li.dataset.ocr = item.ocr;
        li.querySelectorAll('img').forEach(img => {
          img.dataset.ocrDone = '1';
        });
      }

      return li;
    }
    function captureExpansionState() {
      const state = new Set();
      document.querySelectorAll('#notes li').forEach(li => {
        const ul = li.querySelector('.child-notes');
        if (ul && ul.style.display === 'block') {
          state.add(li.dataset.id);
        }
      });
      return state;
    }
    function restoreExpansionState(state) {
      document.querySelectorAll('#notes li').forEach(li => {
        const ul = li.querySelector('.child-notes');
        const btn = li.querySelector('.expand-btn');
        if (!ul || !btn) return;

        if (state.has(li.dataset.id)) {
          if (ul.style.display === 'none') toggleChildren(btn);
        } else {
          if (ul.style.display === 'block') toggleChildren(btn);
        }
      });
    }

    function searchNotes(query) {
      query = query.trim().toLowerCase();
      searchResults = [];
      searchIndex = -1;
      // search cleared → restore state
      if (!query) {
        searchResults = [];searchIndex = -1;updateSearchStatus();
        if (searchExpansionSnapshot) {
          restoreExpansionState(searchExpansionSnapshot);
          searchExpansionSnapshot = null;
        }
        document.querySelectorAll('.search-hit')
          .forEach(el => el.classList.remove('search-hit'));
        return;
      }

      // always reset to original state before each incremental search
      if (!searchExpansionSnapshot) {
        searchExpansionSnapshot = captureExpansionState();
      } else {
        restoreExpansionState(searchExpansionSnapshot);
      }

      // clear previous highlights
      document.querySelectorAll('.search-hit').forEach(el => {
        el.classList.remove('search-hit');
        document.getElementById('searchStatus').textContent = '';
      });

      const allNotes = document.querySelectorAll('#notes li');

      for (const li of allNotes) {
        const btn = li.querySelector('.note-button');
        const rawTitle = btn.dataset.raw || btn.innerText || '';
        const titleNoImages = rawTitle.replace(/<img\s+[^>]*>/gi, '');

        const titleText = titleNoImages.toLowerCase();
        const ocrText = (li.dataset.ocr || '').toLowerCase();

        const text = titleText + '\n' + ocrText;

        if (text.includes(query)) {
          //console.log(query,text);
          btn.classList.add('search-hit');
          expandAncestors(li);
          searchResults.push(li);
          updateSearchStatus();
        }
      }
    }
    function updateSearchStatus() {
      const el = document.getElementById('searchStatus');
      if (!el) return;
      el.textContent = `${searchResults.length} result(s)`;
    }
    function focusResult(i) {
      if (!searchResults.length) return;
      const li = searchResults[i];
      li.scrollIntoView({ block: 'center' });
      li.querySelector('.note-button')?.focus?.();
    }
    function nextResult() {
      if (!searchResults.length) return;
      searchIndex = (searchIndex + 1) % searchResults.length;
      focusResult(searchIndex);
    }
    function prevResult() {
      if (!searchResults.length) return;
      searchIndex = (searchIndex - 1 + searchResults.length) % searchResults.length;
      focusResult(searchIndex);
    }
    function expandAncestors(li) {
      let parentLi = li.closest('ul').closest('li');

      while (parentLi) {
        const btn = parentLi.querySelector('.expand-btn');
        const childList = parentLi.querySelector('.child-notes');

        if (btn && childList && childList.style.display === 'none') {
          toggleChildren(btn);
        }

        parentLi = parentLi.closest('ul').closest('li');
      }
    }
    async function runOCR(imageSrc) {
      const result = await Tesseract.recognize(
        imageSrc,
        'eng',
        {
          //logger: m => console.log(m.status, m.progress)
        }
      );

      return result.data.text || '';
    }
    async function ocrImageInNote(li, img) {
      if (img.dataset.ocrDone) return;
      img.dataset.ocrDone = '1';
      ocrInFlight++;
      updateOCRStatus();
      const text = await runOCR(img.src);
      li.dataset.ocr = (li.dataset.ocr || '') + '\n' + text;
      ocrInFlight--;
      updateOCRStatus();
    }
    function updateOCRStatus() {
      const el = document.getElementById('ocrStatus');
      if (!el) return;
      el.textContent = ocrInFlight > 0
        ? `OCR running (${ocrInFlight})…`
        : 'OCR idle';
    }

    const observer = new MutationObserver(mutations => {
      for (const m of mutations) {
        for (const node of m.addedNodes) {
          if (!(node instanceof HTMLElement)) continue;

          const imgs = node.querySelectorAll?.('img:not([data-ocr-done])');
          if (!imgs) continue;

          for (const img of imgs) {
            const li = img.closest('li');
            if (li) ocrImageInNote(li, img);
          }
        }
      }
    });

    observer.observe(document.getElementById('notes'), {
      childList: true,
      subtree: true
    });



  </script>

</body>
</html>
